services:
  postgres:
    image: postgres:17-alpine
    container_name: yuragi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yuragi
      POSTGRES_USER: yuragi
      POSTGRES_PASSWORD: yuragi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuragi -d yuragi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
